<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pagos del Programa</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family: Arial;
margin:40px;
background:#f4f6f8;
}

h1{
color:#1f2937;
}

input{
margin-top:20px;
}

table{
margin-top:30px;
border-collapse: collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
font-size:14px;
}

th{
background:#1f2937;
color:white;
}

.error{
color:red;
margin-top:20px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Pagos del Programa</h1>

<p>Subir archivo oficial generado por el sistema</p>

<input type="file" id="excelFile">

<div id="errores" class="error"></div>

<table id="tabla">

<thead>

<tr>
<th>Recibo</th>
<th>Documento</th>
<th>Afiliado</th>
<th>Banco</th>
<th>Detalle</th>
<th>Total</th>
<th>Estado</th>
</tr>

</thead>

<tbody></tbody>

</table>

<br>
<a href="index.html">← Volver al panel</a>

<script>

document.getElementById("excelFile").addEventListener("change",procesarExcel)

function procesarExcel(e){

const archivo = e.target.files[0]

if(archivo.name !== "Pagos_Seguridad_Social.xlsx"){

document.getElementById("errores").innerText =
"Archivo incorrecto. Debe subir el archivo oficial Pagos_Seguridad_Social.xlsx"

return
}

const reader = new FileReader()

reader.onload = function(event){

const data = new Uint8Array(event.target.result)

const workbook = XLSX.read(data,{type:"array"})

const sheet = workbook.Sheets[workbook.SheetNames[0]]

const rows = XLSX.utils.sheet_to_json(sheet,{header:1})

leerDatos(rows)

}

reader.readAsArrayBuffer(archivo)

}

function leerDatos(rows){

const tbody = document.querySelector("#tabla tbody")

tbody.innerHTML = ""

let errores = []

for(let i=1;i<rows.length;i++){

let r = rows[i]

let recibo = r[4]
let documento = r[5]
let afiliado = r[6]
let detalle = r[10]
let banco = r[12]

let eps = Number(r[18]) || 0
let arl = Number(r[20]) || 0
let afp = Number(r[22]) || 0
let ccf = Number(r[24]) || 0

let totalSS = Number(r[29]) || 0
let total = Number(r[28]) || 0

let calculo = eps + arl + afp + ccf

let estado = "OK"

if(calculo !== totalSS){

estado = "ERROR SS"

errores.push("Error en recibo "+recibo)

}

let tr = document.createElement("tr")

tr.innerHTML = `
<td>${recibo}</td>
<td>${documento}</td>
<td>${afiliado}</td>
<td>${banco}</td>
<td>${detalle}</td>
<td>${total}</td>
<td>${estado}</td>
`

tbody.appendChild(tr)

}

if(errores.length>0){

document.getElementById("errores").innerText =
errores.join("\n")

}

}

</script>

</body>
</html>
