<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movimientos Banco</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;margin:40px;background:#f4f6f8;}
h1{color:#1f2937;}
table{margin-top:30px;border-collapse:collapse;width:100%;background:white;}
th,td{border:1px solid #ddd;padding:8px;font-size:14px;}
th{background:#1f2937;color:white;}
input,select{width:100%;border:none;}
button{background:#1f2937;color:white;border:none;padding:8px 15px;cursor:pointer;margin-top:10px;}
</style>
</head>

<body>

<h1>Movimientos del Banco</h1>

<p>Subir archivo Excel del banco</p>
<input type="file" id="excelFile">

<table id="tablaBanco">
<thead>
<tr>
<th>Fecha</th>
<th>Descripción</th>
<th>Valor</th>
<th>Recibo</th>
<th>Concepto</th>
</tr>
</thead>
<tbody></tbody>
</table>

<br>
<button onclick="agregarMovimiento()">+ Agregar movimiento manual</button>

<br><br>
<a href="index.html">← Volver</a>

<script>

const conceptos = [
"Seguridad Social",
"Gastos Bancarios",
"Hernan",
"Incapacidad",
"Inc-Pagada",
"Ingreso Intereses",
"Otros gastos",
"Otros Ingresos",
"Planillas Pagadas"
]

document.getElementById("excelFile").addEventListener("change",leerBanco)

function excelFecha(numero){
let fecha = new Date((numero - 25569) * 86400 * 1000)
return fecha.toISOString().split("T")[0]
}

function leerBanco(e){

const archivo = e.target.files[0]

const reader = new FileReader()

reader.onload = function(event){

const data = new Uint8Array(event.target.result)
const workbook = XLSX.read(data,{type:"array"})
const sheet = workbook.Sheets[workbook.SheetNames[0]]
const rows = XLSX.utils.sheet_to_json(sheet)

mostrarBanco(rows)

}

reader.readAsArrayBuffer(archivo)

}

function mostrarBanco(rows){

const tbody = document.querySelector("#tablaBanco tbody")
tbody.innerHTML=""

rows.forEach(r=>{

let fecha = r["Fecha"] || r["FECHA"] || ""
let descripcion = r["Descripción"] || r["Descripcion"] || r["DETALLE"] || ""

let debito = Number(r["Débito"] || r["Debito"] || 0)
let credito = Number(r["Crédito"] || r["Credito"] || 0)

let valor = credito - debito

if(typeof fecha === "number"){
fecha = excelFecha(fecha)
}

crearFila(fecha,descripcion,valor)

})

}

function crearFila(fecha,descripcion,valor){

const tbody = document.querySelector("#tablaBanco tbody")

let selectConcepto="<select>"
conceptos.forEach(c=>{
selectConcepto+=`<option>${c}</option>`
})
selectConcepto+="</select>"

let tr=document.createElement("tr")

tr.innerHTML=`
<td><input value="${fecha}"></td>
<td><input value="${descripcion}"></td>
<td><input value="${valor}"></td>
<td><input placeholder="Recibo"></td>
<td>${selectConcepto}</td>
`

tbody.appendChild(tr)

}

function agregarMovimiento(){
crearFila("","","")
}

</script>

</body>
</html>
